<!DOCTYPE html>
<html>
<head>
  <title>Admin - Teriyaki Taste</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Admin Orders</h1>

<div id="orders"></div>

<script>
fetch("/orders")
  .then(res => res.json())
  .then(data => {
    document.getElementById("orders").innerHTML =
      data.map(o => `
        <div class="order">
          <b>Order #${o.id}</b><br>
          Items: ${o.items.map(i => i.name).join(", ")}<br>
          Total: $${o.total}
        </div>
      `).join("");
  });
</script>

</body>
</html>
