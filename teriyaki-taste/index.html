<!DOCTYPE html>
<html>
<head>
  <title>Teriyaki Taste</title>
  <style>
    body { font-family: Arial; background: #111; color: white; padding: 20px; }
    .item { background:#222; padding:10px; margin:10px 0; display:flex; justify-content:space-between; }
    button { background:red; color:white; border:none; padding:5px; cursor:pointer; }
    .cart { margin-top:20px; }
  </style>
</head>
<body>

<h1>Teriyaki Taste</h1>

<div id="menu"></div>

<h2>Cart</h2>
<div id="cart"></div>

<button onclick="checkout()">Place Order</button>

<script>
let menu = [];
let cart = [];

fetch("/menu")
  .then(r => r.json())
  .then(data => {
    menu = data;
    renderMenu();
  });

function renderMenu(){
  document.getElementById("menu").innerHTML = menu.map((item,i)=>`
    <div class="item">
      ${item.name} - $${item.price}
      <button onclick="add(${i})">Add</button>
    </div>
  `).join("");
}

function add(i){
  cart.push(menu[i]);
  renderCart();
}

function renderCart(){
  document.getElementById("cart").innerHTML =
    cart.map(c => `<div>${c.name} - $${c.price}</div>`).join("");
}

function checkout(){
  fetch("/order", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ items: cart })
  });

  alert("Order placed!");
  cart = [];
  renderCart();
}
</script>

</body>
</html>
