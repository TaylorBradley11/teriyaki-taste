<!DOCTYPE html>
<html>
<head>
  <title>Teriyaki Taste</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Teriyaki Taste</h1>

<div id="menu"></div>

<h2>Your Cart</h2>
<div id="cart"></div>

<button onclick="checkout()">Place Order</button>

<script>
let menu = [];
let cart = [];

fetch("/menu")
  .then(res => res.json())
  .then(data => {
    menu = data;
    renderMenu();
  });

function renderMenu() {
  document.getElementById("menu").innerHTML =
    menu.map((item, i) => `
      <div class="item">
        <div>
          <b>${item.name}</b><br>
          $${item.price}
        </div>
        <button onclick="add(${i})">Add</button>
      </div>
    `).join("");
}

function add(i) {
  cart.push(menu[i]);
  renderCart();
}

function renderCart() {
  document.getElementById("cart").innerHTML =
    cart.map(c => `<div>${c.name} - $${c.price}</div>`).join("");
}

function checkout() {
  let total = cart.reduce((sum, i) => sum + i.price, 0);

  fetch("/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: cart, total })
  });

  alert("Order placed!");
  cart = [];
  renderCart();
}
</script>

</body>
</html>
